{% extends "base.html" %}
{% block title %}Discover · Nwety{% endblock %}
{% block body %}
<div class="topbar">
    <div>
        <h1 id="page-title">…</h1>
        <div class="who" id="page-subtitle">…</div>
    </div>
    <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
        <a href="/" id="switch-link">Switch</a>
    </div>
</div>

<div class="discover" id="discover">
    <div class="empty"><p>Loading…</p></div>
</div>

<div class="bottom-nav">
    <a href="/chat/{{ user_id }}" id="nav-chat">Chat</a>
    <a href="/discover/{{ user_id }}" class="active" id="nav-discover">Discover</a>
</div>
{% endblock %}

{% block scripts %}
<script>
window.CURRENT_USER_ID = Number("{{ user_id }}");
</script>
<script src="/static/js/speech.js"></script>
<script src="/static/js/discover.js"></script>
{% endblock %}
